# Trackt — self-hosted deployment (PRD §6.1: one command, `docker compose up`).
#
#   1. cp .env.example .env  (set AUTH_SECRET, optionally TMDB_API_KEY)
#   2. docker compose up -d
#   3. open http://localhost:3000
#
# TLS is not bundled: put Caddy/nginx in front, or use a platform that
# terminates TLS for you (Railway does).

services:
  app:
    image: ghcr.io/pvrnn/trackt:latest
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL:-http://localhost:3000}
      DATABASE_URL: postgres://trackt:${POSTGRES_PASSWORD:-trackt}@postgres:5432/trackt
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:?set AUTH_SECRET in .env — generate one with `openssl rand -base64 32`}
      CATALOG_URL: ${CATALOG_URL:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      UPLOADS_DIR: /app/data/uploads
    ports:
      - '${APP_PORT:-3000}:3000'
    volumes:
      - uploads:/app/data/uploads

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackt}
      POSTGRES_DB: trackt
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trackt -d trackt']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # Nightly pg_dump into ./backups — enable with: docker compose --profile backup up -d
  backup:
    image: prodrigestivill/postgres-backup-local:16
    profiles: ['backup']
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: trackt
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trackt}
      POSTGRES_DB: trackt
      SCHEDULE: '@daily'
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
    volumes:
      - ./backups:/backups

  # Optional S3-compatible storage for covers — enable with --profile minio
  minio:
    image: minio/minio:latest
    profiles: ['minio']
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-trackt}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-trackt-minio}
    volumes:
      - miniodata:/data
    ports:
      - '9000:9000'
      - '9001:9001'

volumes:
  pgdata:
  redisdata:
  uploads:
  miniodata:
