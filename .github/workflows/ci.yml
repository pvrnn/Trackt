name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    # Mirror docker-compose.dev.yml so the Postgres-backed integration suites
    # (which default to localhost:5432 app DB / localhost:5433 catalog DB and
    # create their own trackt_*_test databases) actually run instead of
    # self-skipping. CI_REQUIRE_DB makes a skip a hard failure.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trackt
          POSTGRES_PASSWORD: trackt
          POSTGRES_DB: trackt
        ports:
          - '5432:5432'
        options: >-
          --health-cmd "pg_isready -U trackt -d trackt"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      postgres-catalog:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trackt
          POSTGRES_PASSWORD: trackt
          POSTGRES_DB: trackt_catalog
        ports:
          - '5433:5432'
        options: >-
          --health-cmd "pg_isready -U trackt -d trackt_catalog"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
        env:
          CI_REQUIRE_DB: 'true'

  # Self-hosters never build from source (PRD §6): images are published to ghcr.io
  # with semver tags on releases and `main` for the bleeding edge.
  docker:
    if: github.event_name == 'push'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
